name: Test Notarization

on:
  workflow_dispatch:

jobs:
  notarize-test:
    name: Test signing & notarization
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-python@v5
        id: python
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci
        env:
          PYTHON: ${{ steps.python.outputs.python-path }}

      - name: Build
        run: npm run build

      - name: Patch notarize to log full output before JSON.parse
        run: |
          node -e "
            const fs = require('fs');
            const f = 'node_modules/@electron/notarize/lib/notarytool.js';
            let c = fs.readFileSync(f, 'utf8');
            c = c.replace(
              'const parsed = JSON.parse(result.output.trim());',
              'console.error(\"[notarytool raw output]\", result.output); const parsed = JSON.parse(result.output.trim());'
            );
            fs.writeFileSync(f, c);
            console.log('patched');
          "

      - name: Package
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run package
