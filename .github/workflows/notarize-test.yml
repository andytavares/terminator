name: Test Notarization

on:
  workflow_dispatch:

jobs:
  notarize-test:
    name: Test signing & notarization credentials
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "${{ secrets.APPLE_CERTIFICATE }}" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Write API key
        run: echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > $RUNNER_TEMP/api_key.p8

      - name: Verify API key credentials
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          echo "APPLE_API_KEY_ID=${APPLE_API_KEY_ID}"
          echo "APPLE_API_ISSUER=${APPLE_API_ISSUER}"
          xcrun notarytool history \
            --key $RUNNER_TEMP/api_key.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --output-format json 2>&1

      - name: Sign and notarize minimal app bundle
        timeout-minutes: 10
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          APP_PATH=$RUNNER_TEMP/TestApp.app
          mkdir -p "$APP_PATH/Contents/MacOS"
          printf '#!/bin/bash\necho hello\n' > "$APP_PATH/Contents/MacOS/TestApp"
          chmod +x "$APP_PATH/Contents/MacOS/TestApp"
          cat > "$APP_PATH/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleIdentifier</key><string>com.terminator.notarizetest</string>
            <key>CFBundleExecutable</key><string>TestApp</string>
            <key>CFBundleVersion</key><string>1</string>
          </dict></plist>
          PLIST

          IDENTITY=$(security find-identity -v -p codesigning "$RUNNER_TEMP/build.keychain" | grep "Developer ID Application" | head -1 | awk '{print $2}')
          echo "Signing with identity: $IDENTITY"
          codesign --force --options runtime \
            --keychain "$RUNNER_TEMP/build.keychain" \
            --sign "$IDENTITY" "$APP_PATH"
          codesign -vvv --deep --strict "$APP_PATH"

          echo "--- submitting to notary service ---"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$RUNNER_TEMP/TestApp.zip"
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$RUNNER_TEMP/TestApp.zip" \
            --key $RUNNER_TEMP/api_key.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --output-format json 2>&1)
          echo "$SUBMIT_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || echo "")
          if [ -z "$SUBMISSION_ID" ]; then
            echo "ERROR: could not parse submission ID — auth likely failed"
            exit 1
          fi

          echo "--- waiting for result (submission: $SUBMISSION_ID) ---"
          xcrun notarytool wait "$SUBMISSION_ID" \
            --key $RUNNER_TEMP/api_key.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --output-format json 2>&1
