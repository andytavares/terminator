appId: com.terminator.app
productName: Terminator
directories:
  output: dist
npmRebuild: true
files:
  - out/**/*
# PGlite loads its postgres.wasm / postgres.data from disk relative to the
# package directory; those assets cannot be read from inside the asar archive,
# so unpack the package to app.asar.unpacked. Without this the main process
# rejects in initAppDb() and the window never opens.
asarUnpack:
  - '**/node_modules/@electric-sql/pglite/**'
mac:
  icon: resources/icon.png
  target:
    - target: dmg
      arch: arm64
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  notarize: true
